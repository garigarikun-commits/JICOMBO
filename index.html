<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#68152c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jicombo">
  <title>Jicombo</title>
  <link rel="manifest" href="manifest.webmanifest?v=29">
  <link rel="apple-touch-icon" href="Jicombo-icon.png?v=29">
  <link rel="apple-touch-icon-precomposed" href="Jicombo-icon.png?v=29">
  <link rel="icon" href="Jicombo-icon.png?v=29">
  <style>
    :root {
      --app-height: 100dvh;
      --wine: #68152c;
      --plum: #6d1f4f;
      --berry: #ab1a33;
      --pink: #f24661;
      --hot: #d2397f;
      --sun: #feb805;
      --cream: #fefcce;
      --text: rgba(254, 252, 206, .92);
      --muted: rgba(254, 252, 206, .66);
      --panel: rgba(31, 7, 26, .58);
      --stroke: rgba(254, 184, 5, .24);
      --green: #64f5a7;
      --red: #ff4f6d;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html {
      width: 100%;
      min-height: 100%;
      height: -webkit-fill-available;
      margin: 0;
      padding: 0;
      background: transparent;
      background-color: #21001c;
      scrollbar-color: transparent transparent;
      scroll-behavior: smooth;
    }
    body {
      margin: 0;
      padding: 0;
      min-width: 100%;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
      scrollbar-color: transparent transparent;
      touch-action: pan-y;
      -webkit-font-smoothing: antialiased;
      position: relative;
      z-index: 0;
      isolation: isolate;
      background: transparent;
      background-color: #21001c;
    }
    #viewport-bg {
      position: fixed;
      top: -120px;
      right: 0;
      bottom: -120px;
      left: 0;
      height: calc(var(--app-height, 100dvh) + 240px);
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 18%, rgba(170, 84, 49, 0.94) 0%, rgba(151, 61, 53, 0.88) 26%, rgba(110, 30, 66, 0.70) 52%, rgba(33, 0, 28, 0) 76%),
        linear-gradient(180deg, #9b4d3d 0%, #7a2840 34%, #52133f 63%, #36032d 82%, #21001c 100%);
      background-position: center top, center top;
    }
    body::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
      background: transparent;
    }
    button, input { font: inherit; }
    main { position: relative; z-index: 0; background: transparent !important; }
    .app { position: relative; z-index: 0; width: min(100%, 720px); background: transparent !important; }
    button { cursor: pointer; }

    .screen {
      background: transparent !important;
      position: relative;
      z-index: 0;
      width: min(100%, 440px);
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      margin: 0 auto;
      padding:
        calc(24px + env(safe-area-inset-top))
        calc(22px + env(safe-area-inset-right))
        calc(24px + env(safe-area-inset-bottom))
        calc(22px + env(safe-area-inset-left));
      gap: 8px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .screen.active { display: flex; }
    .game-screen {
      background: transparent !important;
      position: relative;
      z-index: 0;
      justify-content: center;
      gap: 14px;
    }
    .game-inner {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: inherit;
      transition: transform .25s ease, gap .25s ease, padding .25s ease;
    }

    .home-example {
      margin: 0 0 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .02em;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-weight: 800;
      font-size: clamp(28px, 7.8vw, 38px);
      letter-spacing: 0;
      color: var(--cream);
      text-shadow: 0 0 24px rgba(254,184,5,.25);
      white-space: nowrap;
    }
    .home-example .floaty-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      animation: floaty 2.6s ease-in-out infinite;
      flex: 0 0 auto;
    }
    .home-example .floaty-home:nth-child(2) {
      animation-delay: .08s;
    }
    .home-example .floaty-home:nth-child(3) {
      animation-delay: .16s;
    }
    .home-example .floaty-home:nth-child(4) {
      animation-delay: .24s;
    }
    .home-example .floaty-home:nth-child(5) {
      animation-delay: .32s;
    }
    .home-example .floaty-home:nth-child(6) {
      animation-delay: .40s;
    }
    .home-example .floaty-home:nth-child(7) {
      animation-delay: .48s;
    }
    .home-example .home-emoji {
      width: 1.12em;
      font-size: 1.18em;
      text-align: center;
    }
    .home-example .home-op {
      width: .62em;
      font-size: .9em;
      font-weight: 950;
      text-align: center;
      opacity: 1;
      transform: translateY(0);
    }
    .home-example .home-question {
      width: 1.02em;
      font-size: 1.18em;
      margin-left: 0;
      transform: translateY(0);
    }
    .logo {
      display: block;
      height: auto;
      user-select: none;
      filter: drop-shadow(0 8px 20px rgba(39, 7, 24, .28));
      transition: transform .16s ease, filter .16s ease;
    }
    .logo:hover {
      transform: translateY(-2px) scale(1.02);
      filter: drop-shadow(0 10px 24px rgba(39, 7, 24, .32)) brightness(1.02);
    }
    .home-logo {
      width: min(360px, 74vw);
      margin: 0 0 4px;
    }
    .game-logo {
      width: min(280px, 68vw);
      margin-bottom: 2px;
      cursor: pointer;
    }
    .credits {
      margin: 10px 0 0;
      display: grid;
      gap: 4px;
      color: rgba(254,252,206,.72);
      font-size: .95rem;
      line-height: 1.3;
      font-weight: 300;
    }
    .credits strong { color: rgba(254,252,206,.9); font-weight: 700; text-decoration: none; }
    .credits .credit-link { text-decoration: underline; }
    .actions {
      width: min(260px, 82vw);
      margin-top: 10px;
      display: grid;
      gap: 12px;
    }
    .btn {
      width: 260px;
      max-width: 100%;
      height: 66px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      border-radius: 999px;
      color: #240d1a;
      background: linear-gradient(135deg, #fefcce 0%, #ffe78b 48%, #feb805 100%);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: .98rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      box-shadow: 0 12px 26px rgba(242,70,97,.12), 0 0 16px rgba(254,184,5,.10);
      transition: transform .14s ease, box-shadow .14s ease, filter .14s ease, opacity .14s ease;
    }
    .btn:hover, .btn:focus-visible {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 14px 30px rgba(242,70,97,.16), 0 0 20px rgba(254,184,5,.14);
      filter: brightness(1.02);
    }
    .btn.secondary {
      width: 260px;
      max-width: 100%;
      height: 66px;
      color: #feb805;
      background: rgba(104,21,44,.14);
      border: 2px solid rgba(254,184,5,.24);
      box-shadow: inset 0 0 0 1px rgba(254,184,5,.05), 0 10px 18px rgba(0,0,0,.12);
    }
    .cheat-card {
      width: min(100%, 360px);
      padding: 28px 24px;
      border-radius: 28px;
      border: 1px solid rgba(254,184,5,.18);
      background: linear-gradient(180deg, rgba(80,20,44,.78), rgba(30,7,26,.74));
      box-shadow: 0 24px 56px rgba(0,0,0,.28);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .cheat-title {
      font-size: 1rem;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--cream);
    }
    .cheat-input {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 2px solid rgba(254,184,5,.26);
      background: rgba(19,4,15,.72);
      color: #feb805;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: .28em;
      text-align: center;
      text-transform: uppercase;
      outline: none;
    }
    .cheat-input:focus {
      border-color: rgba(254,184,5,.62);
      box-shadow: 0 0 24px rgba(254,184,5,.14);
    }
    .cheat-hint,.cheat-status {
      min-height: 1.4em;
      color: var(--muted);
      font-size: .9rem;
      margin: 0;
    }
    .cheat-status.ok { color: #8ff0a4; }
    .cheat-status.bad { color: #ff8794; }
    .cheat-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: -4px;
    }
    .cheat-keypad {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      width: 100%;
      gap: 6px;
    }
    .cheat-key {
      width: auto;
      height: 38px;
      border-radius: 9px;
      border: 1px solid rgba(254,184,5,.18);
      background: rgba(104,21,44,.18);
      color: var(--cream);
      font-weight: 800;
      font-size: .76rem;
      letter-spacing: .08em;
      line-height: 1;
    }
    .cheat-key.delete {
      font-size: 1rem;
      letter-spacing: 0;
      font-family: "Segoe UI Symbol", "Apple Symbols", "Noto Sans Symbols", sans-serif;
    }
    .cheat-card.unlock { animation: unlockPulse .62s ease both; }
    .cheat-input.ok {
      border-color: #52d273;
      box-shadow: 0 0 26px rgba(82,210,115,.28);
      color: #9cffb3;
    }
    .cheat-input.bad {
      border-color: #ff4d5e;
      box-shadow: 0 0 24px rgba(255,77,94,.24);
      color: #ff9aa5;
      animation: codeShake .34s ease;
    }
    @keyframes codeShake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-7px); }
      40% { transform: translateX(7px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes unlockPulse {
      0% { box-shadow: 0 24px 56px rgba(0,0,0,.28); }
      50% { box-shadow: 0 0 34px rgba(254,184,5,.28), 0 24px 56px rgba(0,0,0,.28); transform: translateY(-2px); }
      100% { box-shadow: 0 24px 56px rgba(0,0,0,.28); transform: translateY(0); }
    }

    .level-pill {
      padding: 8px 14px;
      border: 1px solid rgba(254,184,5,.24);
      border-radius: 999px;
      color: rgba(254,252,206,.82);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      background: rgba(104,21,44,.14);
    }
    .prompt-title {
      margin: 0 0 -8px;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: .03em;
      color: rgba(254,252,206,.82);
    }
    .clues {
      min-height: 164px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
      gap: 14px;
      padding: 8px 0 2px;
      width: 100%;
    }
    .clue {
      display: inline-grid;
      place-items: center;
      width: 122px;
      height: 122px;
      border-radius: 30px;
      background: rgba(21, 7, 28, .10);
      border: 1px solid rgba(254,184,5,.06);
      box-shadow: inset 0 0 10px rgba(242,70,97,.02), 0 8px 14px rgba(0,0,0,.06);
      font-size: 84px;
      animation: floaty 2.6s ease-in-out infinite;
      flex: 0 0 auto;
    }
    .clue:nth-child(2) { animation-delay: .18s; }
    .clue:nth-child(3) { animation-delay: .34s; }
    .clue:nth-child(4) { animation-delay: .5s; }
    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-10px) rotate(1deg); }
    }
    .hint {
      min-height: 24px;
      margin: -2px 0 0;
      color: var(--muted);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: 14px;
      letter-spacing: .04em;
    }
    .answer-form {
      width: min(340px, 100%);
      display: grid;
      justify-items: center;
      gap: 14px;
      margin-top: 2px;
    }
    .answer-input-wrap {
      position: relative;
      width: 100%;
    }
    .answer-input {
      width: 100%;
      height: 58px;
      border-radius: 18px;
      border: 2px solid rgba(254,184,5,.34);
      outline: none;
      background: rgba(4, 1, 8, .46);
      color: var(--cream);
      text-align: center;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .04em;
      padding: 0 18px;
      box-shadow: 0 0 0 rgba(254,184,5,0), inset 0 0 18px rgba(0,0,0,.22);
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    .answer-input:focus {
      border-color: var(--sun);
      box-shadow: 0 0 24px rgba(254,184,5,.18), inset 0 0 18px rgba(0,0,0,.22);
    }
    .answer-input.correct { border-color: var(--green); box-shadow: 0 0 28px rgba(100,245,167,.26); }
    .answer-input.wrong { border-color: var(--red); box-shadow: 0 0 28px rgba(255,79,109,.28); }
    .validate-btn {
      width: 136px;
      height: 42px;
      padding: 0;
      border: none;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: .98rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #031c34;
      background: linear-gradient(135deg, #f6f0c3 0%, #dbd3a6 100%);
      box-shadow: 0 10px 22px rgba(0,0,0,.14);
      transition: transform .14s ease, box-shadow .14s ease, opacity .14s ease;
    }
    .validate-btn:hover:not(:disabled), .validate-btn:focus-visible:not(:disabled) {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 12px 24px rgba(0,0,0,.18);
    }
    .validate-btn:disabled {
      opacity: .34;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .shake { animation: shake .36s ease; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-7px); }
      40% { transform: translateX(7px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
    .hearts {
      display: flex;
      justify-content: center;
      gap: 8px;
      min-height: 26px;
      font-size: 22px;
      filter: drop-shadow(0 5px 9px rgba(0,0,0,.26));
    }
    .message {
      min-height: 24px;
      color: rgba(254,252,206,.78);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: 14px;
      font-weight: 700;
    }
    .message.good { color: var(--green); }
    .message.bad { color: var(--red); }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at 50% 18%, rgba(254,184,5,.12), rgba(254,184,5,0) 36%),
        rgba(4,1,8,.78);
      backdrop-filter: blur(10px);
      z-index: 10;
    }
    .overlay.active { display: grid; animation: overlayFade .22s ease both; }
    .modal {
      position: relative;
      overflow: hidden;
      width: min(312px, 84vw);
      padding: 22px 22px 20px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,0) 18%),
        linear-gradient(155deg, rgba(82,18,52,.98), rgba(28,7,24,.98) 72%);
      border: 1px solid rgba(254,184,5,.24);
      box-shadow:
        0 26px 72px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.06),
        inset 0 0 34px rgba(242,70,97,.07);
      text-align: center;
      animation: modalPop .24s cubic-bezier(.2,.8,.2,1) both;
    }
    .modal::before {
      content: "";
      position: absolute;
      top: -52px;
      left: 50%;
      width: 160px;
      height: 100px;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(254,184,5,.18), rgba(254,184,5,0) 70%);
      pointer-events: none;
    }
    .modal::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.025);
    }
    .modal-emoji {
      margin: 0 auto 10px;
      display: block;
      font-size: 58px;
      animation: modalFloat 3.8s ease-in-out infinite;
      line-height: 1;
      background: none;
      border: none;
      box-shadow: none;
      width: auto;
      height: auto;
    }
    .modal h2 {
      margin: 0 0 8px;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: 22px;
      line-height: 1.08;
      color: var(--cream);
      text-shadow: 0 4px 18px rgba(0,0,0,.16);
    }
    .modal p {
      margin: 4px 0;
      color: rgba(254,252,206,.78);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.28;
    }
    .modal .answer {
      display: inline;
      margin-top: 0;
      color: var(--sun);
      font-weight: 980;
      font-size: 1.04em;
      text-shadow: 0 0 14px rgba(254,184,5,.16);
    }
    .modal .btn {
      width: min(176px, 100%);
      margin-top: 16px;
      min-height: 60px;
      border-radius: 11px;
      color: #3b1608;
      background: linear-gradient(135deg, #fff0a8 0%, #ffd85a 24%, #ffb347 58%, #ff8b3d 100%);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: 18px;
      font-weight: 980;
      letter-spacing: .06em;
      text-transform: none;
      box-shadow: 0 16px 30px rgba(255,139,61,.22), 0 0 22px rgba(255,216,90,.16);
    }
    .modal .btn:hover, .modal .btn:focus-visible {
      transform: translateY(-1px) scale(1.01);
      filter: brightness(1.02);
      box-shadow: 0 18px 34px rgba(255,139,61,.28), 0 0 26px rgba(255,216,90,.2);
    }
    #levelOverlay .modal {
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,0) 18%),
        linear-gradient(155deg, rgba(88,24,62,.98), rgba(28,8,28,.98) 72%);
    }
    @keyframes overlayFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes modalPop {
      from { opacity: 0; transform: translateY(10px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .confetti-piece {
      position: fixed;
      top: -20px;
      pointer-events: none;
      z-index: 200;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }


    @media (min-width: 641px) {
      body {
        padding: 20px;
      }
      .screen {
      background: transparent !important;
        min-height: calc(100vh - 40px);
        min-height: calc(100dvh - 40px);
      }
      #home.screen.active,
      #cheat.screen.active,
      #game.screen.active {
        justify-content: center;
      }
    }

    @media (max-width: 640px) {
      .screen {
      background: transparent !important;
        width: min(100%, 420px);
        padding:
          calc(18px + env(safe-area-inset-top))
          calc(18px + env(safe-area-inset-right))
          calc(18px + env(safe-area-inset-bottom))
          calc(18px + env(safe-area-inset-left));
        justify-content: center;
      }
      .home-example {
        margin-bottom: 14px;
        font-size: clamp(22px, 7vw, 30px);
      }
      .home-logo {
        width: min(304px, 71vw);
      }
      .game-logo {
        width: min(248px, 66vw);
      }
      .credits {
        font-size: 14px;
        gap: 2px;
      }
      .actions {
        width: min(250px, 82vw);
        gap: 10px;
      }
      .btn,
      .btn.secondary {
        width: 250px;
        height: 60px;
        font-size: .94rem;
      }
      .game-screen {
      background: transparent !important;
      position: relative;
      z-index: 0;
        justify-content: center;
        gap: 10px;
      }
      .prompt-title {
        margin-bottom: -6px;
      }
      .hint {
        margin-top: -1px;
      }
      .clues {
        min-height: 132px;
        gap: 8px;
        padding-top: 4px;
      }
      .clue {
        width: 92px;
        height: 92px;
        font-size: 60px;
        border-radius: 22px;
      }
      .answer-form {
        width: min(312px, 100%);
        gap: 12px;
      }
      .answer-input-wrap {

    function looseText(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/&/g, " et ")
        .replace(/\u0153/g, "oe")
        .replace(/\u00e6/g, "ae")
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function normalize(value) {
      return looseText(value).replace(/\s+/g, "");
    }

    function importantWords(value) {
      return looseText(value)
        .split(/\s+/)
        .filter((word) => word && !STOP_WORDS.has(word));
    }

    function editDistance(a, b) {
      if (a === b) return 0;
      if (!a || !b) return Math.max(a.length, b.length);
      const previous = Array.from({ length: b.length + 1 }, (_, index) => index);
      const current = new Array(b.length + 1);
      for (let i = 1; i <= a.length; i++) {
        current[0] = i;
        for (let j = 1; j <= b.length; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          current[j] = Math.min(current[j - 1] + 1, previous[j] + 1, previous[j - 1] + cost);
        }
        previous.splice(0, previous.length, ...current);
      }
      return previous[b.length];
    }

    function typoLimit(length) {
      if (length <= 5) return 0;
      if (length <= 9) return 1;
      if (length <= 16) return 2;
      return 3;
    }

    function closeEnough(input, expected) {
      const distance = editDistance(input, expected);
      return distance <= typoLimit(Math.max(input.length, expected.length));
    }

    function candidateAnswers(title) {
      const key = normalize(title);
      const words = importantWords(title);
      const candidates = new Set([key, normalize(words.join(" "))]);
      const aliases = ANSWER_ALIASES[key] || [];
      for (const alias of aliases) candidates.add(normalize(alias));

      const primaryFragment = String(title || "")
        .split(/\(|\)|\-|:|–|—/)
        .map((part) => part.trim())
        .filter(Boolean)[0];
      if (primaryFragment) {
        candidates.add(normalize(primaryFragment));
        const fragmentWords = importantWords(primaryFragment);
        if (fragmentWords.length) candidates.add(normalize(fragmentWords.join(" ")));
      }

      if (words.length > 1) candidates.add(normalize(words.slice(0, 2).join(" ")));
      if (words.length > 2) candidates.add(normalize(words.slice(-2).join(" ")));
      return [...candidates].filter(Boolean);
    }

    function hasEnoughKeywords(inputWords, expectedWords) {
      if (expectedWords.length < 2) return false;
      const matched = expectedWords.filter((word) => inputWords.some((input) => input === word || closeEnough(input, word)));
      const required = expectedWords.length <= 2 ? expectedWords.length : Math.ceil(expectedWords.length * 0.66);
      return matched.length >= required;
    }

    function isAcceptedAnswer(input, puzzle) {

      const candidates = candidateAnswers(puzzle.title);
      if (candidates.some((candidate) => typed === candidate || closeEnough(typed, candidate))) return true;
      return hasEnoughKeywords(importantWords(input), importantWords(puzzle.title));
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

            emoji: "\u{1F494}",
            title: "Partie termin\u00e9e",
            answer: state.current.title,
            scoreText: `Score : ${state.score} ${state.score > 1 ? "points" : "point"}`,
            buttonText: "Rejouer \u25ba",
          });
        }
      }
    }

    function nextPuzzle() {
      overlay.classList.remove("active");
      levelOverlay.classList.remove("active");
      if (state.lives <= 0) return startGame(state.speedrun);
      state.index += 1;
      if (state.index >= state.deck.length) return endGame();
      if (levelBreaks(state.deck).includes(state.index)) {
        showLevelModal(currentLevelLabel(state.index, state.deck[state.index]));
        return;
      }
      renderPuzzle();
    }

    function endGame() {
      const elapsed = Math.round((Date.now() - state.startTime) / 1000);
      const timeText = state.speedrun ? ` \u00b7 Temps : ${elapsed}s` : "";
      showModal({
        emoji: "\u{1F3C6}",
        title: "Jicombo termin\u00e9 !",
        answer: "",
        scoreText: `Score : ${state.score}/${state.deck.length}${timeText}`,
        buttonText: "Rejouer \u25ba",
      });
      state.lives = 0;
    }

    function showCheat() {
      setScreen("cheat");
      cheatStatus.textContent = "";
      cheatStatus.className = "cheat-status";
      cheatInput.value = "";
      cheatInput.className = "cheat-input";
      document.querySelector(".cheat-card").classList.remove("unlock");
      setTimeout(() => cheatInput.focus({ preventScroll: true }), 80);
    }

    function goHome() {
      dismissAnswerKeyboard();
      overlay.classList.remove("active");
      levelOverlay.classList.remove("active");
      setScreen("home");
      message.textContent = "";
    }

    function refreshHome() {
      window.location.href = window.location.pathname + window.location.search;
    }

    function submitCheat() {
      const code = cheatInput.value.trim().toUpperCase();
      cheatInput.value = code;
      cheatStatus.className = "cheat-status";
      cheatInput.className = "cheat-input";
      const card = document.querySelector(".cheat-card");
      void cheatInput.offsetWidth;
      if (code === "FAKFAK") {
        cheatStatus.textContent = "Checkpoint d\u00e9bloqu\u00e9 ! \u{1F513}";
        cheatStatus.classList.add("ok");
        cheatInput.classList.add("ok");
        card.classList.remove("unlock");
        void card.offsetWidth;
        card.classList.add("unlock");
        vibrate([30,35,45]);
        unlockSound();
        const run = uniqueDeck();
        const start = run.findIndex((p) => p.clues.length === 4);
        setTimeout(() => startGame(false, Math.max(0, start), run), 900);
        return;
      }
      cheatStatus.textContent = code.length ? "Code inconnu" : "Entre un code secret...";
      cheatStatus.classList.add("bad");
      cheatInput.classList.add("bad");
      vibrate(70);
      deniedSound();
    }

    renderHomeExample();

    homeLogo.addEventListener("click", refreshHome);
    homeLogo.addEventListener("keydown", (event) => { if (event.key === "Enter" || event.key === " ") refreshHome(); });
    $("playBtn").addEventListener("click", () => startGame(false));
    $("speedBtn").addEventListener("click", () => startGame(true));
    $("cheatBtn").addEventListener("click", showCheat);
    $("gameLogo").addEventListener("click", goHome);
    $("gameLogo").addEventListener("keydown", (event) => { if (event.key === "Enter" || event.key === " ") goHome(); });
    $("cheatLogo").addEventListener("click", goHome);
    $("cheatLogo").addEventListener("keydown", (event) => { if (event.key === "Enter" || event.key === " ") goHome(); });
    $("cheatSubmit").addEventListener("click", submitCheat);
    cheatInput.addEventListener("input", (event) => { event.target.value = event.target.value.toUpperCase().replace(/[^A-Z0-9._-]/g, "").slice(0, 6); });
    cheatInput.addEventListener("keydown", (event) => { if (event.key === "Enter") submitCheat(); });
    document.querySelectorAll(".cheat-key").forEach((btn) => btn.addEventListener("click", () => { const key = btn.dataset.key; if (key === "DEL") { cheatInput.value = cheatInput.value.slice(0, -1); return; } if (cheatInput.value.length < 6) cheatInput.value += key; }));
    answerInput.addEventListener("input", () => { validateBtn.disabled = !answerInput.value.trim(); });
    answerInput.addEventListener("focus", () => {
      document.body.classList.add("keyboard-open");
    });
    answerInput.addEventListener("blur", () => {
      setTimeout(() => {
        if (document.activeElement !== answerInput) document.body.classList.remove("keyboard-open");
        if (isStandalonePwa) syncViewportOnLaunch(true);
      }, 20);
    });
    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        dismissAnswerKeyboard(true);
      }
    });
    answerForm.addEventListener("submit", validateAnswer);
    continueBtn.addEventListener("click", nextPuzzle);
    levelContinueBtn.addEventListener("click", () => {
      levelOverlay.classList.remove("active");
      renderPuzzle();
    });
    document.addEventListener("pointerdown", (event) => {
      if (!game.classList.contains("active")) return;
      if (overlay.classList.contains("active") || levelOverlay.classList.contains("active")) return;
      if (document.activeElement !== answerInput) return;
      if (answerForm.contains(event.target)) return;
      dismissAnswerKeyboard(true);
    });

    if (isStandalonePwa) {
      window.addEventListener("load", syncViewportOnLaunch);
      window.addEventListener("resize", syncViewportOnLaunch);
      window.addEventListener("orientationchange", syncViewportOnLaunch);
      window.addEventListener("pageshow", syncViewportOnLaunch);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", syncViewportOnLaunch);
      }
      syncViewportOnLaunch();
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register(`sw.js?v=${CACHE_VERSION}`).catch(() => {});
      });
    }
  </script>
</body>
</html>
